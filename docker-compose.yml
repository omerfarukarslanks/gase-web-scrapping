services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-news_scraper}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama bu makinede RAM kullanmasin diye simdilik uzak makinede calisiyor.
  # Uzak sunucu: http://192.168.1.103:11434
  # Gerekirse tekrar acmak icin bu blogu yorumdan cikar:
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
      RENDERER_URL: http://renderer:3001
    volumes:
      - ./backend:/app
      # Shared volume: renderer writes here, API serves via /static/videos
      - static_videos:/app/static/videos
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      # Entry file path inside the mounted frontend source
      REMOTION_ENTRY: /frontend/src/remotion/entry.tsx
      # Write rendered videos to the shared static volume
      OUTPUT_DIR: /static/videos
      # API base URL so renderer can resolve relative /static/... URLs
      API_BASE_URL: http://api:8000
      # Path to frontend node_modules for webpack module resolution
      FRONTEND_NODE_MODULES: /frontend/node_modules
      # Allow Chromium to run in Docker
      DISPLAY: ""
    volumes:
      # Frontend source is needed so @remotion/bundler can bundle PromptVideo.tsx
      - ./frontend:/frontend:ro
      # Shared volume: API reads from here via /app/static/videos
      - static_videos:/static/videos
    ports:
      - "3001:3001"
    depends_on:
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_videos:
  # ollama_data:
