services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-news_scraper}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama bu makinede RAM kullanmasin diye simdilik uzak makinede calisiyor.
  # Uzak sunucu: http://192.168.1.104:11434
  # Gerekirse tekrar acmak icin bu blogu yorumdan cikar:
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:8b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:8b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:8b}
      ANALYSIS_MIN_SHARED_SOURCES: ${ANALYSIS_MIN_SHARED_SOURCES:-2}
      ANALYSIS_MAX_ARTICLES_PER_RUN: ${ANALYSIS_MAX_ARTICLES_PER_RUN:-120}
      ANALYSIS_MAX_ARTICLES_PER_SOURCE: ${ANALYSIS_MAX_ARTICLES_PER_SOURCE:-15}
      ANALYSIS_TEXT_CHAR_LIMIT: ${ANALYSIS_TEXT_CHAR_LIMIT:-1200}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  # ollama_data:
